<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudBase 静态托管演示</title>
  <style>
    :root {
      --primary: #4a6cf7;
      --primary-dark: #3451d1;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-light: #64748b;
      --border: #e2e8f0;
      --radius: 16px;
      --shadow: 0 4px 24px rgba(74,108,247,0.12);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Hero Section */
    .hero {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      text-align: center;
      padding: 80px 20px 60px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle at 30% 70%, rgba(255,255,255,.15) 0%, transparent 50%);
      animation: float 8s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translate(0, 0); }
      50% { transform: translate(-3%, 3%); }
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }

    .hero p {
      font-size: clamp(1rem, 2vw, 1.25rem);
      opacity: 0.9;
      max-width: 600px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .hero .badge {
      display: inline-block;
      background: rgba(255,255,255,.2);
      backdrop-filter: blur(10px);
      padding: 6px 18px;
      border-radius: 999px;
      font-size: 14px;
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
    }

    /* Container */
    .container {
      max-width: 1100px;
      margin: -40px auto 60px;
      padding: 0 20px;
      position: relative;
      z-index: 2;
    }

    /* Cards Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow);
      transition: transform .3s ease, box-shadow .3s ease;
      border: 1px solid var(--border);
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 40px rgba(74,108,247,0.18);
    }

    .card-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
    }

    .card h3 { font-size: 1.25rem; margin-bottom: 10px; }
    .card p { color: var(--text-light); font-size: 15px; }

    /* Stats Bar */
    .stats {
      display: flex; flex-wrap: wrap;
      justify-content: center; gap: 40px;
      padding: 48px 20px;
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-top: -30px;
      margin-bottom: 40px;
    }

    .stat { text-align: center; }
    .stat-num { font-size: 2.5rem; font-weight: 800; color: var(--primary); }
    .stat-label { color: var(--text-light); font-size: 14px; margin-top: 4px; }

    /* Footer */
    footer {
      text-align: center;
      padding: 30px 20px;
      color: var(--text-light);
      font-size: 14px;
      border-top: 1px solid var(--border);
    }

    footer a { color: var(--primary); text-decoration: none; }

    @media (max-width: 600px) {
      .hero { padding: 60px 16px 44px; }
      .stats { gap: 24px; }
      .stat-num { font-size: 1.8rem; }
      .card { padding: 24px; }
    }
  </style>
</head>
<body>

  <!-- Hero -->
  <section class="hero">
    <div class="badge">✨ CloudBase 静态托管</div>
    <h1>一键部署，即刻上线</h1>
    <p>基于腾讯云开发静态托管，你的网站将在几秒钟内部署到全球 CDN 节点</p>
  </section>

  <!-- Stats -->
  <div class="container">
    <div class="stats">
      <div class="stat"><div class="stat-num">∞</div><div class="stat-label">全球 CDN 分发</div></div>
      <div class="stat"><div class="stat-num">HTTPS</div><div class="stat-label">自动证书</div></div>
      <div class="stat"><div class="stat-num">&lt;1s</div><div class="stat-label">冷启动时间</div></div>
      <div class="stat"><div class="stat-num">99.9%</div><div class="stat-label">可用性 SLA</div></div>
    </div>

    <!-- Feature Cards -->
    <div class="grid">
      <div class="card">
        <div class="card-icon">🚀</div>
        <h3>极速部署</h3>
        <p>一条命令即可将网站部署到云端，支持 SPA 路由回退，无需复杂的服务器配置。</p>
      </div>

      <div class="card">
        <div class="card-icon">🔒</div>
        <h3>安全可靠</h3>
        <p>自动 HTTPS 加密、DDoS 防护、WAF 防火墙，让你的网站安全无忧。</p>
      </div>

      <div class="card">
        <div class="card-icon">📱</div>
        <h3>响应式设计</h3>
        <p>完美适配手机、平板、桌面端，一套代码，多端体验。</p>
      </div>
    </div>
  </div>

  <footer>
    <p>Powered by <a href="#">CloudBase</a> · Deployed with ❤️</p>
  </footer>

</body>
</html>
